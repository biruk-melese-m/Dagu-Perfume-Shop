<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Dagu Perfume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>

<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Dagu Admin</h2>
    </div>
    <ul class="nav">
      <li class="nav-item active">Orders</li>
      <li class="nav-item">Products (Coming Soon)</li>
      <li class="nav-item">Settings</li>
    </ul>
    <div class="sidebar-footer">
      <a href="index.html" class="back-link">← Back to Store</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <h1 class="page-title">Recent Orders</h1>
      <div class="topbar-actions">
        <button class="btn-primary" onclick="loadOrders()">Refresh Data</button>
      </div>
    </header>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-title">Total Orders</div>
        <div class="stat-value" id="statTotal">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Pending</div>
        <div class="stat-value" id="statPending">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Completed</div>
        <div class="stat-value" id="statCompleted">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Revenue (Br)</div>
        <div class="stat-value" id="statRevenue">--</div>
      </div>
    </div>

    <div class="table-container">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Order Ref</th>
            <th>Date</th>
            <th>Customer</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody">
          <!-- Populated by JS -->
          <tr>
            <td colspan="6" style="text-align: center; padding: 30px;">Loading orders...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Order Detail Modal -->
  <div class="modal-backdrop" id="orderModalBackdrop" onclick="closeOrderModal()"></div>
  <div class="modal" id="orderModal">
    <div class="modal-header">
      <h2 id="modalTitle">Order Details</h2>
      <button class="close-btn" onclick="closeOrderModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="order-info-grid">
        <div class="info-group">
          <label>Customer Name</label>
          <div id="modalCustomerName">--</div>
        </div>
        <div class="info-group">
          <label>Phone Number</label>
          <div id="modalCustomerPhone">--</div>
        </div>
        <div class="info-group">
          <label>Transaction ID</label>
          <div id="modalTxId">--</div>
        </div>
        <div class="info-group">
          <label>Payment Method</label>
          <div id="modalPayMethod">--</div>
        </div>
        <div class="info-group">
          <label>Order Date</label>
          <div id="modalDate">--</div>
        </div>
        <div class="info-group">
          <label>Status</label>
          <select id="modalStatusSelect" onchange="updateOrderStatus()">
            <option value="Pending">Pending</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
      </div>

      <div class="modal-divider"></div>

      <h3 style="color: rgba(255,255,255,0.9); margin-bottom: 12px; font-size: 14px; font-weight: 500;">Order Items</h3>
      <div class="order-items-list" id="modalItemsList">
        <!-- Rendered by JS -->
      </div>

      <div class="modal-total" id="modalTotal">
        Total: --
      </div>
    </div>
  </div>

  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
  <!-- CONFIG & LOGIC -->
  <script src="firebase-config.js"></script>
  <script src="admin.js"></script>
</body>

</html>
